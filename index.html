<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cursusmateriaal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0078d4">
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; overflow: hidden; -webkit-user-select: none; user-select: none; }

        #header { background: #0078d4; color: white; padding: 0 20px; display: flex; align-items: center; height: 56px; }
        #header h1 { font-size: 20px; font-weight: 600; }

        #breadcrumb {
            background: #004578; padding: 0 12px; display: flex; align-items: center;
            overflow-x: auto; gap: 2px; height: 40px; white-space: nowrap; scrollbar-width: none;
        }
        #breadcrumb::-webkit-scrollbar { display: none; }
        .crumb { color: rgba(255,255,255,0.75); font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 4px; flex-shrink: 0; }
        .crumb:hover { background: rgba(255,255,255,0.15); color: white; }
        .crumb.active { color: white; font-weight: 600; cursor: default; }
        .crumb-sep { color: rgba(255,255,255,0.35); font-size: 13px; flex-shrink: 0; padding: 0 2px; }

        #file-list { overflow-y: auto; height: calc(100vh - 96px); display: none; }
        .file-item {
            display: flex; align-items: center; gap: 16px; padding: 14px 20px;
            border-bottom: 1px solid #ebebeb; background: white; cursor: pointer; min-height: 60px;
        }
        .file-item:active { background: #e8f0fe; }
        .file-icon { font-size: 26px; flex-shrink: 0; width: 32px; text-align: center; }
        .file-name { font-size: 15px; color: #323130; flex: 1; line-height: 1.3; }
        .file-arrow { color: #c8c6c4; font-size: 20px; flex-shrink: 0; }

        #login-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            height: calc(100vh - 96px); gap: 20px;
        }
        #login-screen p { color: #666; font-size: 16px; text-align: center; padding: 0 32px; }
        #login-btn {
            background: #0078d4; color: white; border: none; padding: 14px 32px;
            font-size: 16px; border-radius: 4px; cursor: pointer; font-family: 'Segoe UI', sans-serif; font-weight: 600;
        }

        #loading { display: none; align-items: center; justify-content: center; height: 200px; color: #666; font-size: 15px; gap: 12px; }
        .spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* PDF Viewer */
        #pdf-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a1a; flex-direction: column; z-index: 100; }
        #pdf-overlay.active { display: flex; }

        #pdf-header { background: #2d2d2d; color: white; padding: 0 12px; display: flex; align-items: center; gap: 8px; height: 52px; flex-shrink: 0; }
        #pdf-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 8px; line-height: 1; min-width: 40px; }
        #pdf-title { font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pdf-hdr-btn { background: #3d3d3d; border: none; color: white; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 16px; min-width: 36px; height: 36px; }
        .pdf-hdr-btn:active { background: #555; }

        #pdf-search-bar { background: #252525; padding: 8px 12px; display: none; flex-shrink: 0; border-bottom: 1px solid #3a3a3a; align-items: center; gap: 8px; }
        #pdf-search-bar.visible { display: flex; }
        #pdf-search-input { flex: 1; background: #333; border: 1px solid #555; color: white; padding: 7px 10px; border-radius: 4px; font-size: 14px; font-family: 'Segoe UI', sans-serif; }
        #pdf-search-input::placeholder { color: #888; }
        .pdf-search-btn { background: #0078d4; border: none; color: white; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .pdf-search-nav { background: #3d3d3d; border: none; color: white; padding: 7px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        #pdf-search-info { color: #aaa; font-size: 13px; min-width: 64px; text-align: center; }

        #pdf-body { flex: 1; display: flex; overflow: hidden; }

        #pdf-outline { width: 240px; background: #222; overflow-y: auto; flex-shrink: 0; display: none; border-right: 1px solid #333; }
        #pdf-outline.visible { display: block; }
        .outline-title { padding: 10px 14px; font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #333; }
        .outline-item { padding: 9px 14px; cursor: pointer; font-size: 13px; color: #ccc; border-bottom: 1px solid #2a2a2a; line-height: 1.3; }
        .outline-item:active { background: #0078d4; color: white; }
        .outline-child { padding-left: 26px; font-size: 12px; color: #999; }

        #pdf-pages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .pdf-page-wrapper { box-shadow: 0 2px 12px rgba(0,0,0,0.6); background: white; max-width: 100%; }
        .pdf-page-wrapper canvas { display: block; max-width: 100%; height: auto; }

        #pdf-footer { background: #2d2d2d; color: #888; padding: 5px 16px; font-size: 12px; text-align: center; flex-shrink: 0; }

        /* Image Viewer */
        #img-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a1a; flex-direction: column; z-index: 100; }
        #img-overlay.active { display: flex; }
        #img-header { background: #2d2d2d; color: white; padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 52px; flex-shrink: 0; }
        #img-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 8px; }
        #img-title { font-size: 14px; flex: 1; }
        #img-container { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 16px; }
        #img-viewer { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="header"><h1>Cursusmateriaal</h1></div>
<div id="breadcrumb"></div>

<div id="login-screen">
    <p>Log in om het cursusmateriaal te bekijken</p>
    <button id="login-btn" onclick="login()">Inloggen met Microsoft</button>
</div>
<div id="loading" style="display:flex;"><div class="spinner"></div> Laden...</div>
<div id="file-list"></div>

<!-- PDF Viewer -->
<div id="pdf-overlay">
    <div id="pdf-header">
        <button id="pdf-close" onclick="closePdf()">&#8592;</button>
        <span id="pdf-title"></span>
        <button class="pdf-hdr-btn" onclick="toggleSearch()" title="Zoeken">&#128269;</button>
        <button class="pdf-hdr-btn" onclick="toggleOutline()" title="Inhoudsopgave">&#9776;</button>
    </div>
    <div id="pdf-search-bar">
        <input id="pdf-search-input" type="text" placeholder="Zoeken in document..." onkeydown="if(event.key==='Enter')searchPdf()">
        <button class="pdf-search-btn" onclick="searchPdf()">Zoek</button>
        <button class="pdf-search-nav" onclick="searchPrev()">&#8679;</button>
        <button class="pdf-search-nav" onclick="searchNext()">&#8681;</button>
        <span id="pdf-search-info"></span>
    </div>
    <div id="pdf-body">
        <div id="pdf-outline"><div class="outline-title">Inhoudsopgave</div></div>
        <div id="pdf-pages"><div style="color:#888;padding:48px;text-align:center;">Laden...</div></div>
    </div>
    <div id="pdf-footer">Laden...</div>
</div>

<!-- Image Viewer -->
<div id="img-overlay">
    <div id="img-header">
        <button id="img-close" onclick="closeImg()">&#8592;</button>
        <span id="img-title"></span>
    </div>
    <div id="img-container"><img id="img-viewer" src="" alt=""></div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

const CLIENT_ID = "f8d8baea-d338-452a-b8e1-59f2eb8e5798";
const TENANT_ID = "ae41881d-6637-4aa3-ba69-66ead0c703df";
const SITE_HOST = "remotechniek.sharepoint.com";
const SITE_PATH = "/sites/COVakmanschap";
const ROOT_PATH = "Tablets/Vakmanschap CO";

pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const msalInstance = new msal.PublicClientApplication({
    auth: {
        clientId: CLIENT_ID,
        authority: `https://login.microsoftonline.com/${TENANT_ID}`,
        redirectUri: window.location.origin + window.location.pathname
    },
    cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: true }
});

const SCOPES = ["Sites.Read.All", "Files.Read.All"];
let driveId = null;
let breadcrumbs = [];

// PDF state
let pdfDoc = null;
let searchResults = [];
let searchIdx = -1;
let outlineVisible = false;
let searchVisible = false;

async function init() {
    await msalInstance.handleRedirectPromise();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length === 0) {
        show('login-screen');
    } else {
        await loadApp();
    }
}

async function login() {
    await msalInstance.loginRedirect({ scopes: SCOPES });
}

async function getToken() {
    const account = msalInstance.getAllAccounts()[0];
    try {
        const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
        return r.accessToken;
    } catch {
        await msalInstance.acquireTokenRedirect({ scopes: SCOPES, account });
    }
}

async function graphGet(url) {
    const token = await getToken();
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error(`Graph ${res.status}: ${await res.text()}`);
    return res.json();
}

async function loadApp() {
    show('loading');
    try {
        const site = await graphGet(`https://graph.microsoft.com/v1.0/sites/${SITE_HOST}:${SITE_PATH}`);
        const drives = await graphGet(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`);
        const drive = drives.value.find(d => d.name === "Gedeelde documenten" || d.name === "Documents" || d.name === "Documenten");
        if (!drive) throw new Error('Bibliotheek niet gevonden. Beschikbaar: ' + drives.value.map(d => d.name).join(', '));
        driveId = drive.id;

        const rootFolder = await graphGet(
            `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${ROOT_PATH}`
        );
        breadcrumbs = [{ name: "Vakmanschap CO", id: rootFolder.id }];
        await loadFolder(rootFolder.id);
    } catch (e) {
        showError(e.message);
    }
}

async function loadFolder(folderId) {
    show('loading');
    try {
        const res = await graphGet(
            `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${folderId}/children`
        );
        renderBreadcrumb();
        renderItems(res.value);
    } catch (e) {
        showError(e.message);
    }
}

function renderBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = breadcrumbs.map((c, i) => {
        const last = i === breadcrumbs.length - 1;
        const sep = i > 0 ? `<span class="crumb-sep">&#8250;</span>` : '';
        return `${sep}<span class="crumb ${last ? 'active' : ''}" onclick="navToCrumb(${i})">${c.name}</span>`;
    }).join('');
    bc.scrollLeft = bc.scrollWidth;
}

function renderItems(items) {
    show('file-list');
    const list = document.getElementById('file-list');
    if (!items.length) {
        list.innerHTML = '<div style="padding:32px;text-align:center;color:#666;">Geen bestanden</div>';
        return;
    }
    const sorted = [...items].sort((a, b) => {
        if (!!a.folder !== !!b.folder) return a.folder ? -1 : 1;
        return a.name.localeCompare(b.name, 'nl');
    });
    list.innerHTML = sorted.map(item => {
        const isFolder = !!item.folder;
        const icon = isFolder ? '&#128193;' : fileIcon(item.name);
        const dlUrl = item['@microsoft.graph.downloadUrl'] || '';
        const data = JSON.stringify({ id: item.id, name: item.name, isFolder, url: dlUrl });
        return `<div class="file-item" onclick='openItem(${data.replace(/'/g, "&#39;")})'>
            <span class="file-icon">${icon}</span>
            <span class="file-name">${item.name}</span>
            <span class="file-arrow">${isFolder ? '&#8250;' : ''}</span>
        </div>`;
    }).join('');
}

function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'pdf') return '&#128196;';
    if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) return '&#128444;';
    return '&#128203;';
}

async function openItem({ id, name, isFolder, url }) {
    if (isFolder) {
        breadcrumbs.push({ name, id });
        await loadFolder(id);
    } else {
        const ext = name.split('.').pop().toLowerCase();
        if (ext === 'pdf') openPdf(url, name);
        else if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) openImage(url, name);
    }
}

async function navToCrumb(i) {
    if (i === breadcrumbs.length - 1) return;
    breadcrumbs = breadcrumbs.slice(0, i + 1);
    await loadFolder(breadcrumbs[i].id);
}

// ─── PDF Viewer ───────────────────────────────────────────────────────────────

async function openPdf(url, name) {
    pdfDoc = null;
    searchResults = [];
    searchIdx = -1;

    document.getElementById('pdf-title').textContent = name;
    document.getElementById('pdf-pages').innerHTML = '<div style="color:#888;padding:48px;text-align:center;"><div class="spinner" style="margin:0 auto 16px;border-top-color:#0078d4;"></div>PDF laden...</div>';
    document.getElementById('pdf-footer').textContent = 'Laden...';
    document.getElementById('pdf-outline').innerHTML = '<div class="outline-title">Inhoudsopgave</div>';
    document.getElementById('pdf-search-info').textContent = '';

    if (outlineVisible) toggleOutline();
    if (searchVisible) toggleSearch();

    document.getElementById('pdf-overlay').classList.add('active');

    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        document.getElementById('pdf-footer').textContent =
            `${pdfDoc.numPages} pagina${pdfDoc.numPages !== 1 ? "'s" : ''}`;

        const outline = await pdfDoc.getOutline();
        renderOutline(outline);

        await renderAllPages();
    } catch(e) {
        document.getElementById('pdf-pages').innerHTML =
            `<div style="color:#f66;padding:32px;text-align:center;">Fout bij laden: ${e.message}</div>`;
    }
}

async function renderAllPages() {
    const container = document.getElementById('pdf-pages');
    container.innerHTML = '';

    for (let i = 1; i <= pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale: 1.5 });

        const wrapper = document.createElement('div');
        wrapper.id = `pdf-page-${i}`;
        wrapper.className = 'pdf-page-wrapper';

        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.maxWidth = '100%';
        canvas.style.height = 'auto';

        wrapper.appendChild(canvas);
        container.appendChild(wrapper);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        await new Promise(r => setTimeout(r, 0));
    }
}

function renderOutline(outline) {
    const el = document.getElementById('pdf-outline');
    el.innerHTML = '<div class="outline-title">Inhoudsopgave</div>';

    if (!outline || outline.length === 0) {
        el.innerHTML += '<div style="padding:12px 14px;color:#666;font-size:13px;">Geen inhoudsopgave beschikbaar</div>';
        return;
    }
    el.innerHTML += buildOutlineHTML(outline, false);
}

function buildOutlineHTML(items, isChild) {
    return items.map(item => {
        const cls = isChild ? 'outline-item outline-child' : 'outline-item';
        const dest = item.dest ? JSON.stringify(item.dest).replace(/'/g, "&#39;") : 'null';
        let html = `<div class="${cls}" onclick='goToOutlineItem(${dest})'>${item.title || '—'}</div>`;
        if (item.items && item.items.length) html += buildOutlineHTML(item.items, true);
        return html;
    }).join('');
}

async function goToOutlineItem(dest) {
    if (!dest || !pdfDoc) return;
    try {
        let destination = dest;
        if (typeof dest === 'string') destination = await pdfDoc.getDestination(dest);
        if (Array.isArray(destination) && destination.length > 0) {
            const pageIndex = await pdfDoc.getPageIndex(destination[0]);
            const el = document.getElementById(`pdf-page-${pageIndex + 1}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    } catch(e) {}
}

async function searchPdf() {
    const query = document.getElementById('pdf-search-input').value.toLowerCase().trim();
    if (!query || !pdfDoc) return;

    document.getElementById('pdf-search-info').textContent = '...';
    searchResults = [];

    for (let i = 1; i <= pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i);
        const content = await page.getTextContent();
        const text = content.items.map(item => item.str).join(' ').toLowerCase();
        if (text.includes(query)) searchResults.push(i);
    }

    if (searchResults.length === 0) {
        document.getElementById('pdf-search-info').textContent = 'Niet gevonden';
        searchIdx = -1;
    } else {
        searchIdx = 0;
        scrollToSearchResult();
    }
}

function scrollToSearchResult() {
    const el = document.getElementById(`pdf-page-${searchResults[searchIdx]}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('pdf-search-info').textContent = `${searchIdx + 1} / ${searchResults.length}`;
}

function searchNext() {
    if (!searchResults.length) return;
    searchIdx = (searchIdx + 1) % searchResults.length;
    scrollToSearchResult();
}

function searchPrev() {
    if (!searchResults.length) return;
    searchIdx = (searchIdx - 1 + searchResults.length) % searchResults.length;
    scrollToSearchResult();
}

function toggleOutline() {
    outlineVisible = !outlineVisible;
    document.getElementById('pdf-outline').classList.toggle('visible', outlineVisible);
}

function toggleSearch() {
    searchVisible = !searchVisible;
    document.getElementById('pdf-search-bar').classList.toggle('visible', searchVisible);
    if (searchVisible) document.getElementById('pdf-search-input').focus();
}

function closePdf() {
    document.getElementById('pdf-overlay').classList.remove('active');
    pdfDoc = null;
    searchResults = [];
    document.getElementById('pdf-pages').innerHTML = '';
    if (outlineVisible) toggleOutline();
    if (searchVisible) toggleSearch();
}

// ─── Image Viewer ──────────────────────────────────────────────────────────────

function openImage(url, name) {
    document.getElementById('img-title').textContent = name;
    document.getElementById('img-viewer').src = url;
    document.getElementById('img-overlay').classList.add('active');
}
function closeImg() {
    document.getElementById('img-overlay').classList.remove('active');
    document.getElementById('img-viewer').src = '';
}

// ─── UI helpers ────────────────────────────────────────────────────────────────

function show(id) {
    ['login-screen', 'loading', 'file-list'].forEach(s => {
        const el = document.getElementById(s);
        el.style.display = s === id ? (s === 'file-list' ? 'block' : 'flex') : 'none';
    });
}

function showError(msg) {
    show('file-list');
    document.getElementById('file-list').innerHTML =
        `<div style="padding:32px;text-align:center;color:#d13438;">Fout: ${msg}</div>`;
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}

init();
</script>
</body>
</html>

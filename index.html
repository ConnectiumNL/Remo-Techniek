<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cursusmateriaal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0078d4">
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; overflow: hidden; -webkit-user-select: none; user-select: none; }

        #header { background: #0078d4; color: white; padding: 0 20px; display: flex; align-items: center; height: 56px; }
        #header h1 { font-size: 20px; font-weight: 600; }

        #breadcrumb {
            background: #004578; padding: 0 12px; display: flex; align-items: center;
            overflow-x: auto; gap: 2px; height: 40px; white-space: nowrap; scrollbar-width: none;
        }
        #breadcrumb::-webkit-scrollbar { display: none; }
        .crumb { color: rgba(255,255,255,0.75); font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 4px; flex-shrink: 0; }
        .crumb:hover { background: rgba(255,255,255,0.15); color: white; }
        .crumb.active { color: white; font-weight: 600; cursor: default; }
        .crumb-sep { color: rgba(255,255,255,0.35); font-size: 13px; flex-shrink: 0; padding: 0 2px; }

        #file-list { overflow-y: auto; height: calc(100vh - 96px); display: none; }
        .file-item {
            display: flex; align-items: center; gap: 16px; padding: 14px 20px;
            border-bottom: 1px solid #ebebeb; background: white; cursor: pointer; min-height: 60px;
        }
        .file-item:active { background: #e8f0fe; }
        .file-icon { font-size: 26px; flex-shrink: 0; width: 32px; text-align: center; }
        .file-name { font-size: 15px; color: #323130; flex: 1; line-height: 1.3; }
        .file-arrow { color: #c8c6c4; font-size: 20px; flex-shrink: 0; }

        #login-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            height: calc(100vh - 96px); gap: 20px;
        }
        #login-screen p { color: #666; font-size: 16px; text-align: center; padding: 0 32px; }
        #login-btn {
            background: #0078d4; color: white; border: none; padding: 14px 32px;
            font-size: 16px; border-radius: 4px; cursor: pointer; font-family: 'Segoe UI', sans-serif; font-weight: 600;
        }

        #loading { display: none; align-items: center; justify-content: center; height: 200px; color: #666; font-size: 15px; gap: 12px; }
        .spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* PDF Viewer */
        #pdf-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a1a; flex-direction: column; z-index: 100; }
        #pdf-overlay.active { display: flex; }
        #pdf-header { background: #2d2d2d; color: white; padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 52px; flex-shrink: 0; }
        #pdf-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 8px; line-height: 1; min-width: 40px; }
        #pdf-title { font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #pdf-controls { background: #2d2d2d; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; flex-shrink: 0; border-top: 1px solid #444; }
        #pdf-controls button { background: #444; border: none; color: white; padding: 8px 16px; border-radius: 4px; font-size: 18px; cursor: pointer; min-width: 48px; min-height: 40px; }
        #pdf-controls button:active { background: #555; }
        #page-info { color: #ccc; font-size: 14px; min-width: 70px; text-align: center; }
        #pdf-canvas-container { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 16px; }
        #pdf-frame { width: 100%; height: 100%; border: none; }

        /* Image Viewer */
        #img-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a1a; flex-direction: column; z-index: 100; }
        #img-overlay.active { display: flex; }
        #img-header { background: #2d2d2d; color: white; padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 52px; flex-shrink: 0; }
        #img-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 8px; }
        #img-title { font-size: 14px; flex: 1; }
        #img-container { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 16px; }
        #img-viewer { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="header"><h1>Cursusmateriaal</h1></div>
<div id="breadcrumb"></div>

<div id="login-screen">
    <p>Log in om het cursusmateriaal te bekijken</p>
    <button id="login-btn" onclick="login()">Inloggen met Microsoft</button>
</div>
<div id="loading" style="display:flex;"><div class="spinner"></div> Laden...</div>
<div id="file-list"></div>

<div id="pdf-overlay">
    <div id="pdf-header">
        <button id="pdf-close" onclick="closePdf()">&#8592;</button>
        <span id="pdf-title"></span>
    </div>
    <iframe id="pdf-frame" src=""></iframe>
</div>

<div id="img-overlay">
    <div id="img-header">
        <button id="img-close" onclick="closeImg()">&#8592;</button>
        <span id="img-title"></span>
    </div>
    <div id="img-container"><img id="img-viewer" src="" alt=""></div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

const CLIENT_ID = "f8d8baea-d338-452a-b8e1-59f2eb8e5798";
const TENANT_ID = "ae41881d-6637-4aa3-ba69-66ead0c703df";
const SITE_HOST = "remotechniek.sharepoint.com";
const SITE_PATH = "/sites/COVakmanschap";
const ROOT_PATH = "Tablets/Vakmanschap CO";

pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const msalInstance = new msal.PublicClientApplication({
    auth: {
        clientId: CLIENT_ID,
        authority: `https://login.microsoftonline.com/${TENANT_ID}`,
        redirectUri: window.location.origin
    },
    cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: true }
});

const SCOPES = ["Sites.Read.All", "Files.Read.All"];
let driveId = null;
let breadcrumbs = [];
let currentBlobUrl = null;

async function init() {
    await msalInstance.handleRedirectPromise();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length === 0) {
        show('login-screen');
    } else {
        await loadApp();
    }
}

async function login() {
    await msalInstance.loginRedirect({ scopes: SCOPES });
}

async function getToken() {
    const account = msalInstance.getAllAccounts()[0];
    try {
        const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
        return r.accessToken;
    } catch {
        await msalInstance.acquireTokenRedirect({ scopes: SCOPES, account });
    }
}

async function graphGet(url) {
    const token = await getToken();
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error(`Graph ${res.status}: ${await res.text()}`);
    return res.json();
}

async function loadApp() {
    show('loading');
    try {
        const site = await graphGet(`https://graph.microsoft.com/v1.0/sites/${SITE_HOST}:${SITE_PATH}`);
        const drives = await graphGet(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`);
        const drive = drives.value.find(d => d.name === "Gedeelde documenten" || d.name === "Documents" || d.name === "Documenten");
        if (!drive) throw new Error('Bibliotheek niet gevonden. Beschikbaar: ' + drives.value.map(d => d.name).join(', '));
        driveId = drive.id;

        const rootFolder = await graphGet(
            `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${ROOT_PATH}`
        );
        breadcrumbs = [{ name: "Vakmanschap CO", id: rootFolder.id }];
        await loadFolder(rootFolder.id);
    } catch (e) {
        showError(e.message);
    }
}

async function loadFolder(folderId) {
    show('loading');
    try {
        const res = await graphGet(
            `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${folderId}/children`
        );
        renderBreadcrumb();
        renderItems(res.value);
    } catch (e) {
        showError(e.message);
    }
}

function renderBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = breadcrumbs.map((c, i) => {
        const last = i === breadcrumbs.length - 1;
        const sep = i > 0 ? `<span class="crumb-sep">›</span>` : '';
        return `${sep}<span class="crumb ${last ? 'active' : ''}" onclick="navToCrumb(${i})">${c.name}</span>`;
    }).join('');
    bc.scrollLeft = bc.scrollWidth;
}

function renderItems(items) {
    show('file-list');
    const list = document.getElementById('file-list');
    if (!items.length) {
        list.innerHTML = '<div style="padding:32px;text-align:center;color:#666;">Geen bestanden</div>';
        return;
    }
    const sorted = [...items].sort((a, b) => {
        if (!!a.folder !== !!b.folder) return a.folder ? -1 : 1;
        return a.name.localeCompare(b.name, 'nl');
    });
    list.innerHTML = sorted.map(item => {
        const isFolder = !!item.folder;
        const icon = isFolder ? '📁' : fileIcon(item.name);
        const dlUrl = item['@microsoft.graph.downloadUrl'] || '';
        const data = JSON.stringify({ id: item.id, name: item.name, isFolder, url: dlUrl });
        return `<div class="file-item" onclick='openItem(${data.replace(/'/g, "&#39;")})'>
            <span class="file-icon">${icon}</span>
            <span class="file-name">${item.name}</span>
            <span class="file-arrow">${isFolder ? '›' : ''}</span>
        </div>`;
    }).join('');
}

function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'pdf') return '📄';
    if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) return '🖼️';
    return '📋';
}

async function openItem({ id, name, isFolder, url }) {
    if (isFolder) {
        breadcrumbs.push({ name, id });
        await loadFolder(id);
    } else {
        const ext = name.split('.').pop().toLowerCase();
        if (ext === 'pdf') openPdf(url, name);
        else if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) openImage(url, name);
    }
}

async function navToCrumb(i) {
    if (i === breadcrumbs.length - 1) return;
    breadcrumbs = breadcrumbs.slice(0, i + 1);
    await loadFolder(breadcrumbs[i].id);
}

async function openPdf(url, name) {
    document.getElementById('pdf-title').textContent = name;
    document.getElementById('pdf-overlay').classList.add('active');
    document.getElementById('pdf-frame').src = '';

    try {
        const response = await fetch(url);
        const blob = await response.blob();
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = URL.createObjectURL(blob);
        document.getElementById('pdf-frame').src = '/pdfjs/web/viewer.html?file=' + encodeURIComponent(currentBlobUrl);
    } catch(e) {
        console.error('PDF laden mislukt:', e);
    }
}

function closePdf() {
    document.getElementById('pdf-overlay').classList.remove('active');
    document.getElementById('pdf-frame').src = '';
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
}

function openImage(url, name) {
    document.getElementById('img-title').textContent = name;
    document.getElementById('img-viewer').src = url;
    document.getElementById('img-overlay').classList.add('active');
}
function closeImg() {
    document.getElementById('img-overlay').classList.remove('active');
    document.getElementById('img-viewer').src = '';
}

function show(id) {
    ['login-screen', 'loading', 'file-list'].forEach(s => {
        const el = document.getElementById(s);
        if (s === id) {
            el.style.display = s === 'file-list' ? 'block' : 'flex';
        } else {
            el.style.display = 'none';
        }
    });
}

function showError(msg) {
    show('file-list');
    document.getElementById('file-list').innerHTML =
        `<div style="padding:32px;text-align:center;color:#d13438;">Fout: ${msg}</div>`;
}

// Service worker disabled until HTTPS with valid cert is configured

init();
</script>
</body>
</html>
